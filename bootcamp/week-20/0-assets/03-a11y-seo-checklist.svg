<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Fondo -->
  <rect width="800" height="400" fill="#1a1a1a"/>
  
  <!-- Título -->
  <text x="400" y="35" fill="#ffffff" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Accesibilidad y SEO en React</text>
  
  <!-- Sección A11y -->
  <rect x="50" y="60" width="340" height="150" rx="8" fill="#2d2d2d" stroke="#4ade80" stroke-width="2"/>
  <text x="220" y="90" fill="#4ade80" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">♿ Accesibilidad (a11y)</text>
  
  <text x="70" y="120" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12">✓ HTML Semántico</text>
  <text x="70" y="145" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12">✓ Atributos ARIA</text>
  <text x="70" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12">✓ Navegación por Teclado</text>
  <text x="70" y="195" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12">✓ Focus Management</text>
  
  <text x="230" y="120" fill="#888888" font-family="system-ui, sans-serif" font-size="11">header, nav, main</text>
  <text x="230" y="145" fill="#888888" font-family="system-ui, sans-serif" font-size="11">role, aria-label</text>
  <text x="230" y="170" fill="#888888" font-family="system-ui, sans-serif" font-size="11">tabIndex, onKeyDown</text>
  <text x="230" y="195" fill="#888888" font-family="system-ui, sans-serif" font-size="11">useFocusTrap</text>
  
  <!-- Sección SEO -->
  <rect x="410" y="60" width="340" height="150" rx="8" fill="#2d2d2d" stroke="#61DAFB" stroke-width="2"/>
  <text x="580" y="90" fill="#61DAFB" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">🔍 SEO para SPA</text>
  
  <text x="430" y="120" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12">✓ Meta Tags Dinámicos</text>
  <text x="430" y="145" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12">✓ Open Graph</text>
  <text x="430" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12">✓ Structured Data</text>
  <text x="430" y="195" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12">✓ Sitemap y Robots</text>
  
  <text x="600" y="120" fill="#888888" font-family="system-ui, sans-serif" font-size="11">react-helmet-async</text>
  <text x="600" y="145" fill="#888888" font-family="system-ui, sans-serif" font-size="11">og:title, og:image</text>
  <text x="600" y="170" fill="#888888" font-family="system-ui, sans-serif" font-size="11">JSON-LD Schema</text>
  <text x="600" y="195" fill="#888888" font-family="system-ui, sans-serif" font-size="11">sitemap.xml</text>
  
  <!-- Sección Producción -->
  <rect x="50" y="230" width="700" height="150" rx="8" fill="#2d2d2d" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="260" fill="#a855f7" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">🚀 Checklist de Producción</text>
  
  <!-- Columna 1 -->
  <text x="80" y="290" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ Build sin errores</text>
  <text x="80" y="310" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ Tests pasando</text>
  <text x="80" y="330" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ Cobertura mayor a 60%</text>
  <text x="80" y="350" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ No console.log</text>
  
  <!-- Columna 2 -->
  <text x="280" y="290" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ Lighthouse mayor a 90</text>
  <text x="280" y="310" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ Bundle optimizado</text>
  <text x="280" y="330" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ Lazy loading</text>
  <text x="280" y="350" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ Imágenes comprimidas</text>
  
  <!-- Columna 3 -->
  <text x="490" y="290" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ Docker funcional</text>
  <text x="490" y="310" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ CI/CD configurado</text>
  <text x="490" y="330" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ Variables de entorno</text>
  <text x="490" y="350" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">□ Error Boundary global</text>
</svg>
